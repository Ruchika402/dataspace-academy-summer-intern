name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Build, Test & Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit

      - name: Python Syntax Validation
        run: |
          python -m compileall flask_app src

      - name: Run Tests
        run: |
          pytest tests/ || true

      - name: Security Scan (Bandit)
        run: |
          bandit -r flask_app src

      - name: Build Docker Image
        run: |
          docker build -t pr-validation-image .
