name: PR Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Build, Test & Security Checks
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest bandit pip-audit

      - name: Python Syntax Validation
        run: |
          python -m compileall backend ml

      - name: Django System Check
        run: |
          python backend/manage.py check

      - name: Run Tests
        run: |
          python -m pytest

      - name: Security Scan (Bandit)
        run: |
          bandit -r backend ml

      - name: Dependency Audit
        run: |
          pip-audit -r requirements.txt

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -t pr-validation-image .

  update-labels:
    name: Update Labels
    needs: validate
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Add Passed Label
        if: ${{ needs.validate.result == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "pipeline-validation-passed" --remove-label "pipeline-validation-failed"

      - name: Add Failed Label
        if: ${{ needs.validate.result != 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "pipeline-validation-failed" --remove-label "pipeline-validation-passed"


